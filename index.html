<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=`, initial-scale=1.0">
    <title>wlink - memorable link shortener</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js" integrity="sha512-a+SUDuwNzXDvz4XrIcXHuCf089/iJAoN4lmrXJg18XnduKK6YlDHNRalv4yd1N40OKI80tFidF+rqTFKGPoWFQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script>
        const socket = io();
        function shorten(){
            const longurl = document.querySelector("#longurl").value.toString();
            if(longurl.includes(".")){
                socket.emit("linknum", longurl)
            }else{
                open("/w/"+longurl, "_self");
            }
        }
        socket.on("shortenedurl", (word1, word2) => {
            document.querySelector("#wordlink").innerHTML = word1 + " " + word2
            document.querySelector("#wordlink").href = "/w/"+word1+" "+word2;
        })
        socket.on("urltaken", (word1, word2) => {
            alert("YOUR WORDLINK HAS ALREADY TAKEN.")
            document.querySelector("#wordlink").innerHTML = word1 + " " + word2
            document.querySelector("#wordlink").href = "/w/"+word1+" "+word2;
        })
    </script>
</head>
<body class="bg-zinc-900 p-4">
    <a href="https://github.com/jankoneli/wlink" class="p-1 px-2 bg-zinc-800 border-1 border-zinc-500 text-zinc-100 spacemono font-semibold"><i class="bi bi-github"></i> Fork on GitHub</a>
    <div class="flex flex-col pt-85 lg:pt-100 px-6 lg:px-24 gap-4">
        <h1 class="spacemono text-4xl text-zinc-100 text-center font-bold ">wlink</h1>
        <div class="flex gap-2 lg:flex-row flex-col justify-center items-center">
            <input type="url" placeholder="enter your url or wordlink here" class="border-1 border-zinc-500 outline-none text-zinc-100 p-2 spacemono w-80 lg:w-160" id="longurl">
            <button id="btn" class="bg-zinc-100 text-zinc-800 lg:py-2 py-2 px-2 spacemono font-bold hover:bg-zinc-500 cursor-pointer" onclick="shorten();">Shorten/Open</button>
        </div>
        <h3 class="text-zinc-300 spacemono text-center text-xl">Your wordlink is <a id="wordlink" class="text-orange-500">...</a></h3>
    </div>
    <script>
        document.querySelector("#longurl").addEventListener("keypress", (event) => {
            if(event.key === "Enter"){
                event.preventDefault();
                document.getElementById("btn").click();
            }
        })
    </script>
</body>
</html>
